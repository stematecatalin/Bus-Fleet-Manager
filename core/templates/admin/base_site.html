{% extends "admin/base.html" %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Suprascriem doar accentele, nu fundalul/textul temei Django. */
    :root, :root[data-theme="light"] {
        --primary: #2E7D32 !important;
        --primary-fg: #fff !important;
        --secondary: #1B5E20 !important;
        --accent: #419140 !important;
        
        --header-bg: #2E7D32 !important;
        --header-color: #fff !important;
        --header-link-color: #fff !important;
        
        --breadcrumbs-bg: #2E7D32 !important;
        --breadcrumbs-fg: #fff !important;
        --breadcrumbs-link-fg: #fff !important;
        
        --link-color: #2E7D32 !important;
        --link-hover-color: #1B5E20 !important;
        
        --button-bg: #2E7D32 !important;
        --button-fg: #fff !important;
        --button-hover-bg: #1B5E20 !important;
        
        --default-button-bg: #444 !important;
        --default-button-hover-bg: #222 !important;
        --hairline-color: #d8e8e1 !important;
        --border-color: #d8e8e1 !important;

        /* Lărgim panoul central prin variabilele Django */
        --main-column-max-width: 1600px !important;
    }

    :root[data-theme="dark"] {
        --primary: #2f9d6f !important;
        --primary-fg: #fff !important;
        --secondary: #1f7557 !important;
        --accent: #6fd4a8 !important;
        --header-bg: #10261f !important;
        --header-color: #fff !important;
        --header-link-color: #fff !important;
        --breadcrumbs-bg: #14372d !important;
        --breadcrumbs-fg: #e9f5ef !important;
        --breadcrumbs-link-fg: #fff !important;
        --link-color: #74d7aa !important;
        --link-hover-color: #a7efcc !important;
        --button-bg: #23815f !important;
        --button-fg: #fff !important;
        --button-hover-bg: #2fa978 !important;
        --hairline-color: #31483f !important;
        --border-color: #31483f !important;
        
        --main-column-max-width: 1600px !important;
    }

    /* Forțăm elementele care nu folosesc variabilele corect */
    #header {
        background: linear-gradient(135deg, #0d3329, #176047) !important;
        color: #fff !important;
        box-shadow: 0 12px 32px rgba(15, 61, 49, .18);
    }

    .breadcrumbs {
        background: var(--primary) !important;
        color: #fff !important;
    }

    .breadcrumbs a {
        color: #fff !important;
    }

    /* Branding alb */
    #branding h1 a, #branding h1 a:link, #branding h1 a:visited {
        color: #fff !important;
    }

    /* Culori butoane */
    input[type="submit"], .button, a.button {
        background: var(--primary) !important;
        color: #fff !important;
    }

    /* Modulele (barele verzi de deasupra listelor) */
    .module h2, .module caption {
        background: linear-gradient(135deg, #176047, #218166) !important;
        color: #fff !important;
    }

    #branding {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    #site-name {
        margin-right: 4px;
        font-weight: 850;
        letter-spacing: .02em;
    }

    .admin-fleet-link {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 12px;
        color: #0f3d31 !important;
        border: 1px solid rgba(255,255,255,.55);
        border-radius: 999px;
        background: #fff;
        box-shadow: 0 8px 22px rgba(4, 28, 20, .16);
        font-size: 12px;
        font-weight: 850;
        text-decoration: none;
        white-space: nowrap;
    }

    .admin-fleet-link:hover {
        color: #0b2d24 !important;
        background: #e9f6f1;
    }

    #content {
        padding-top: 24px;
        max-width: 1600px !important;
        width: 95% !important;
        margin: 0 auto;
    }

    /* Django 4.x+ folosește .container sau #container pentru lățimea maximă */
    #container, .container {
        max-width: 1600px !important;
        width: 95% !important;
        margin: 0 auto !important;
    }

    #main {
        max-width: 100% !important;
    }

    .module,
    #changelist,
    .inline-group {
        overflow: hidden;
        border: 1px solid #d8e8e1 !important;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(15, 61, 49, .06);
    }

    #changelist-filter,
    #toolbar,
    .paginator {
        border-color: #d8e8e1 !important;
    }

    table thead th {
        background: #f0f7f4 !important;
    }

    :root[data-theme="dark"] table thead th {
        background: #20352e !important;
    }

    :root[data-theme="dark"] .module,
    :root[data-theme="dark"] #changelist,
    :root[data-theme="dark"] .inline-group {
        border-color: #31483f !important;
        box-shadow: none;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">AUTOTRANS MANAGEMENT</a>
</h1>
<a class="admin-fleet-link" href="{% url 'admin:fleet-optimizer' %}">Agent AI flotă</a>
{% endblock %}

{% block nav-global %}
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
    content="AutoTrans este o platforma pentru consultarea rutelor de autobuz, a statiilor si a programului de circulatie. Utilizatorii pot gasi rapid traseele disponibile si informatii despre transportul public.">

    <meta name="keywords"
    content="autobuze, rute autobuz, transport public, statii autobuz, trasee autobuz, program autobuze, transport urban, autotrans">

    <title>{% block title %}AutoTrans{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="{% static 'core/css/base.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-xxl navbar-dark shadow">
  <div class="container">

        <a class="navbar-brand me-5" href="/">AutoTrans</a>

      <div class="navbar-nav me-auto gap-3">

         <a class="nav-link" href="/">Acasă</a>

          <a class="nav-link" href="/rute/">Rute</a>

          <a class="nav-link" href="/statii/">Statii</a>

          <a class="nav-link" href="/flota/">Flota</a>

          <a class="nav-link" href="/contact/">Contact</a>

      </div>
      <div class="navbar-nav login-btn ms-auto ">
          <a class="btn btn-light rounded-pill px-3 fw-bold d-flex align-items-center gap-2" href="/login/">
              <span>Logheaza-te</span>
              <div class="rounded-circle d-flex justify-content-center align-items-center login-icon-wrapper" style="width:50px;height:50px;">
                  <i class="bi bi-person-fill fs-1"></i>
              </div>
          </a>
      </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

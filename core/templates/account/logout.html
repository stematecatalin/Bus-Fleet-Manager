{% extends "core/base.html" %}
{% load i18n %}

{% block title %}Deconectare - AutoTrans{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Se deconectează...</span>
        </div>
        <p class="mt-3 lead">Se procesează deconectarea...</p>

        <form id="logout-form" method="post" action="{% url 'account_logout' %}" style="display: none;">
            {% csrf_token %}
            {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
            {% endif %}
        </form>
    </div>
</div>

<script>
    // Trimite formularul automat la incarcarea paginii
    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("logout-form").submit();
    });
</script>
{% endblock %}
